server:
  port: 8080
spring:
  application:
    name: gateway-service
  profiles:
    active: dev
  cloud:
    nacos:
      server-addr: 127.0.0.1:8848
    gateway:
      routes:
        - id: item-service
          uri: lb://item-service
          predicates:
            - Path=/item/**,/search/**
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/order/**
        - id: cart-service
          uri: lb://cart-service
          predicates:
            - Path=/cart/**
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/user/**